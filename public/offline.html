<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas Studio - Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0A0A0A; color: #F5F5F5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 40px 20px; }
    .logo { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 24px; }
    .logo span { color: #C8A960; }
    h1 { font-size: 20px; margin-bottom: 12px; }
    p { color: #737373; font-size: 14px; line-height: 1.6; max-width: 400px; margin: 0 auto 24px; }
    button { background: #C8A960; color: #0A0A0A; border: none; padding: 12px 32px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Atlas<span>Studio</span></div>
    <h1>Vous etes hors ligne</h1>
    <p>Verifiez votre connexion internet et reessayez.</p>
    <button onclick="window.location.reload()">Reessayer</button>
  </div>
</body>
</html>
